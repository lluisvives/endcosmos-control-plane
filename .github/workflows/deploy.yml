name: EndCosmos Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Connect to server and restart services
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e

            echo "EndCosmos restart starting..."

            sudo systemctl restart cosmos-ai
            sudo systemctl restart endcosmos-api
            sudo systemctl restart nginx

            echo "Waiting for services..."
            sleep 5

            echo "Checking AI..."
            curl -fsS http://127.0.0.1:17877/api/health

            echo "Checking API..."
            curl -fsS http://127.0.0.1:18080/health

            echo "Checking public web..."
            curl -fsS https://endcosmos.com > /dev/null

            echo "EndCosmos restart finished successfully."
